name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            runtimes: linux-x64,linux-arm64
          - os: windows-latest
            runtimes: win-x64,win-arm64
          - os: macos-latest
            runtimes: osx-x64,osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        shell: bash

      - name: Build Solution
        run: dotnet build SharpTools.sln -c Release

      - name: Publish SSE Server
        run: |
          IFS=',' read -ra RUNTIMES <<< "${{ matrix.runtimes }}"
          for runtime in "${RUNTIMES[@]}"; do
            echo "Publishing SSE Server for $runtime..."
            dotnet publish SharpTools.SseServer/SharpTools.SseServer.csproj \
              -c Release \
              --runtime $runtime \
              --self-contained true \
              --output publish/sse-$runtime \
              --property:PublishSingleFile=true \
              --property:PublishTrimmed=false
          done
        shell: bash

      - name: Publish Stdio Server
        run: |
          IFS=',' read -ra RUNTIMES <<< "${{ matrix.runtimes }}"
          for runtime in "${RUNTIMES[@]}"; do
            echo "Publishing Stdio Server for $runtime..."
            dotnet publish SharpTools.StdioServer/SharpTools.StdioServer.csproj \
              -c Release \
              --runtime $runtime \
              --self-contained true \
              --output publish/stdio-$runtime \
              --property:PublishSingleFile=true \
              --property:PublishTrimmed=false
          done
        shell: bash

      - name: Create Packages (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p packages
          VERSION="${{ steps.version.outputs.version }}"
          
          for server in sse stdio; do
            IFS=',' read -ra RUNTIMES <<< "${{ matrix.runtimes }}"
            for runtime in "${RUNTIMES[@]}"; do
              src_dir="publish/$server-$runtime"
              if [ -d "$src_dir" ]; then
                if [[ "$runtime" == win-* ]]; then
                  pkg_name="sharptools-$server-$runtime-$VERSION.zip"
                  (cd "$src_dir" && zip -r "../../packages/$pkg_name" .)
                else
                  pkg_name="sharptools-$server-$runtime-$VERSION.tar.gz"
                  tar -czf "packages/$pkg_name" -C "$src_dir" .
                fi
                echo "Created: $pkg_name"
              fi
            done
          done
        shell: bash

      - name: Create Packages (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path packages -Force
          $VERSION = "${{ steps.version.outputs.version }}"
          
          $servers = @("sse", "stdio")
          $runtimes = "${{ matrix.runtimes }}".Split(',')
          
          foreach ($server in $servers) {
            foreach ($runtime in $runtimes) {
              $srcDir = "publish/$server-$runtime"
              if (Test-Path $srcDir) {
                $pkgName = "sharptools-$server-$runtime-$VERSION.zip"
                $zipPath = "packages/$pkgName"
                Compress-Archive -Path "$srcDir\*" -DestinationPath $zipPath -Force
                Write-Host "Created: $pkgName"
              }
            }
          }
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: packages/
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: List Packages
        run: ls -lh packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-nuget:
    name: Publish to NuGet
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get Version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix for NuGet
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack SSE Server
        run: |
          dotnet pack SharpTools.SseServer/SharpTools.SseServer.csproj \
            -c Release \
            -o nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Pack Stdio Server
        run: |
          dotnet pack SharpTools.StdioServer/SharpTools.StdioServer.csproj \
            -c Release \
            -o nupkgs \
            /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push nupkgs/*.nupkg \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "NUGET_API_KEY not configured, skipping NuGet publish"
          fi
